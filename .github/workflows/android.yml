# Cloud-builds the Breeze OS Android app on every push to a "claude/"
# branch and on manual trigger. Produces installable APKs that the
# user can sideload from a phone — no laptop required.
#
# Two outputs:
#
#   - debug-apk   — unsigned debug APK, available as a workflow
#                   artifact on every successful run. Install on a
#                   phone with Settings → Security → Install unknown
#                   apps (per-source toggle), then tap the .apk.
#
#   - release-aab — signed Android App Bundle, produced only when the
#                   four ANDROID_KEYSTORE_* secrets below are set in
#                   the repo. Use this to upload to the Play Console.
#
# Required GitHub repo secrets for the release path:
#
#   ANDROID_KEYSTORE_BASE64   — base64 of your .jks file. Generate
#                               with:
#                                 base64 -i breeze-os-release.jks | pbcopy
#   ANDROID_KEYSTORE_PASSWORD — keystore password
#   ANDROID_KEY_ALIAS         — alias used inside the keystore
#                               (e.g. "breeze-release")
#   ANDROID_KEY_PASSWORD      — alias password (often same as store)
#   GOOGLE_SERVICES_JSON      — full contents of the Firebase
#                               google-services.json for FCM. Drop the
#                               raw file contents into the secret; the
#                               workflow writes it to disk.
#
# Triggering from a phone:
#   Open the GitHub mobile app → this repo → Actions → "Android build"
#   → Run workflow. Or just push a commit; the workflow runs
#   automatically. Download the APK from the run page's Artifacts
#   section and tap it.

name: Android build

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'What to build'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

permissions:
  contents: read

jobs:
  build:
    name: Build APK / AAB
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    env:
      # Toggle release mode. `workflow_dispatch` honours the user's
      # input; a regular push always builds debug. (Real release
      # builds should be tag-driven; we'll switch when there's a
      # tagging convention.)
      DO_RELEASE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      # The ubuntu-22.04 image ships with the Android SDK pre-installed
      # but at a varying API level. Force-install platforms-35 +
      # build-tools-35.0.0 so Gradle has what variables.gradle asks for.
      - name: Install Android SDK packages
        run: |
          set -e
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Install JS dependencies
        run: npm ci --no-audit --no-fund

      - name: Build web bundle
        run: npm run build

      # Drop in the FCM credentials if the secret is present. Without
      # this, the build still succeeds (the google-services Gradle
      # plugin is conditional) but push notifications won't work at
      # runtime. We keep it optional so first-time CI runs work
      # before Firebase is provisioned.
      - name: Write google-services.json
        if: env.GOOGLE_SERVICES_JSON != ''
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          echo "google-services.json written ($(wc -c < android/app/google-services.json) bytes)"

      - name: Sync Capacitor → Android
        run: npx cap sync android

      # ── Debug branch ────────────────────────────────────────────
      - name: Build debug APK
        if: env.DO_RELEASE != 'true'
        working-directory: android
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload debug APK
        if: env.DO_RELEASE != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: breeze-os-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      # ── Release branch (signed AAB for Play Console) ────────────
      - name: Decode signing keystore
        if: env.DO_RELEASE == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -e
          if [ -z "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is required for release builds"
            exit 1
          fi
          mkdir -p android/keystore
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/keystore/release.jks
          echo "Decoded keystore: $(wc -c < android/keystore/release.jks) bytes"

      - name: Write keystore.properties
        if: env.DO_RELEASE == 'true'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          {
            echo "storeFile=keystore/release.jks"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > android/keystore.properties

      - name: Build release AAB
        if: env.DO_RELEASE == 'true'
        working-directory: android
        run: ./gradlew --no-daemon bundleRelease

      - name: Upload release AAB
        if: env.DO_RELEASE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: breeze-os-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 90
