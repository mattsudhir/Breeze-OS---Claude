  <!-- Breeze Property Group favicon — pure-SVG recreation of the three-
       building mark from the full brand banner. Self-contained (no
       external image references), so it renders in every modern browser's
       favicon slot without hitting the favicon SVG security restrictions.
       Matches the silver/gray gradient aesthetic of the banner logo. -->
