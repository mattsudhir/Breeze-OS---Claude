<svg xmlns="http://www.w3.org/2000/svg" viewBox="8 12 188 200">
  <!-- Square-cropped favicon for Breeze Property Group. References the
       full-banner /breeze-logo.png and uses viewBox to crop to just the
       building mark on the left side, so the favicon stays in sync with
       whatever /breeze-logo.png is set to without maintaining a second
       asset. Update the viewBox if the banner layout changes. -->
  <image href="/breeze-logo.png" width="655" height="226" x="0" y="0"/>
</svg>
