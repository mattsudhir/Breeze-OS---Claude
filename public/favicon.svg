    <linearGradient id="bldg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D1D6DD"/>
      <stop offset="55%" stop-color="#9CA3AE"/>
      <stop offset="100%" stop-color="#7A8291"/>
